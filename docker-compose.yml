services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - apps_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s

  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: catalog_user
      POSTGRES_PASSWORD: catalog_pass
      POSTGRES_DB: catalog_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - apps_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalog_user -d catalog_db"]
      interval: 5s     
      timeout: 5s
      retries: 5
      start_period: 10s

  users-db:
    image: mariadb:10.11
    restart: always
    container_name: users-db
    environment:
      MYSQL_ROOT_PASSWORD: SenhaAdmin123!
      MYSQL_DATABASE: UsersDb
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - apps_network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10

  catalog-api:
    image: splinterxsr/catalogapi:latest
    restart: always
    ports:
      - "8080:8080"
    environment:
      POSTGRES_USER: catalog_user
      POSTGRES_PASSWORD: catalog_pass
      POSTGRES_DB: catalog_db
      POSTGRES_HOST: postgres
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_HOST: rabbitmq
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - apps_network

  users-api:
    image: anafmel/usersapi:latest
    restart: always
    container_name: users-api
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__MySql=Server=users-db;Port=3306;Database=UsersDb;Uid=root;Pwd=SenhaAdmin123!;
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    depends_on:
      rabbitmq:
        condition: service_healthy
      users-db:
        condition: service_healthy
    networks:
      - apps_network
  catalog-worker:
    image: splinterxsr/catalogworker:latest
    restart: always
    environment:
      POSTGRES_USER: catalog_user
      POSTGRES_PASSWORD: catalog_pass
      POSTGRES_DB: catalog_db
      POSTGRES_HOST: postgres
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_HOST: rabbitmq
      PAYMENT_QUEUE_NAME: payments-queue
    depends_on:
      postgres:
       condition: service_healthy
      rabbitmq:
       condition: service_healthy
    networks:
      - apps_network

  notifications-worker:
    image: splinterxsr/notificationsworker:latest
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_HOST: rabbitmq
      USER_QUEUE_NAME: users-queue
      PAYMENT_QUEUE_NAME: payments-queue
    depends_on:
      rabbitmq:
       condition: service_healthy
    networks:
      - apps_network

volumes:
  rabbitmq_data:
  postgres_data:
  mariadb_data:

networks:
  apps_network:
    driver: bridge